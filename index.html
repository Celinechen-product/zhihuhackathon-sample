    function renderLibrary() {
      const groups = (state.savedQuestionGroups || [])
        .filter((group) => group.samples && group.samples.length)
        .sort((a, b) => (b.lastSavedAt || 0) - (a.lastSavedAt || 0) || (b.createdAt || 0) - (a.createdAt || 0));
      return `
        <section class="screen library-screen">
          <div class="paths-copy library-page-head">
            <div class="library-actions">
              <button class="library-back-button" type="button" data-action="library-back">← 返回上一页</button>
            </div>
            <h1>我的样本库</h1>
          </div>
          ${groups.length ? `
            <div class="library-groups">
              ${groups.map(renderLibraryQuestionGroup).join("")}
            </div>
          ` : renderLibraryEmptyState()}
        </section>
      `;
    }

    function renderLibraryQuestionGroup(group) {
      const samples = [...group.samples]
        .sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0))
        .map((sample) => ({ sample, person: getLibrarySamplePerson(sample) }))
        .filter((item) => item.person);
      if (!samples.length) return "";
      return `
        <section class="library-question-group">
          <div class="library-question-title">
            <h2>“${escapeHtml(group.question)}”</h2>
            <span>已保存 ${samples.length} 个样本</span>
          </div>
          <div class="saved-sample-list">
            ${samples.map(({ person, sample }) => renderSavedSampleCard(person, sample)).join("")}
          </div>
        </section>
      `;
    }

    function renderSavedSampleCard(person, sample = {}) {
      return `
        <article class="saved-sample-card">
          <div class="mini-peep-card">${avatarImg(person.avatar, 0, "", person.name)}</div>
          <div class="saved-sample-info">
            <strong>${escapeHtml(person.name)}</strong>
            <p>路径：${escapeHtml(getPath(person.pathId).name)}</p>
            <p>${escapeHtml(person.oneLine)}</p>
          </div>
          <div class="saved-sample-actions">
            <button class="secondary" type="button" data-action="open-saved" data-id="${person.id}" data-sample-id="${escapeHtml(sample.sampleId || "")}">回看 TA 的经历</button>
            <button class="text-button" type="button" data-action="open-saved-chat" data-id="${person.id}" data-sample-id="${escapeHtml(sample.sampleId || "")}">向TA提问</button>
          </div>
        </article>
      `;
    }

    function renderLibraryEmptyState() {
      return `
        <section class="library-empty-state">
          <h2>你还没有保存样本</h2>
          <p>当你遇到一个想继续参考的人，可以把 TA 收进这里。</p>
          <button class="primary" type="button" data-action="home">去寻找走过的人</button>
        </section>
      `;
    }

    function defaultCommunityDraftBody() {
      return `最近我一直在想一个问题：如果不工作了，我是不是可以去新西兰生活一段时间。

我不是单纯想旅游，也不是已经决定移民。更像是现在对工作和生活状态都有点疲惫，想知道换一个地方之后，自己会不会真的变好。

刚刚看了一些前人的经历，发现有的人先去一年试生活，有的人通过留学转工签留下来，也有人去了之后发现自己只是需要暂停，最后又回来了。

所以想问问真正走过类似路的人：

1. 你当时为什么想去新西兰？
2. 去了之后，最先被现实打破的想象是什么？
3. 如果只是因为职业倦怠，去新西兰生活真的有帮助吗？
4. 出发前最应该先想清楚什么？

希望听到一些真实经历，不需要鸡汤，也不需要攻略。`;
    }

    function renderCommunityDraft() {
      return `
        <section class="screen">
          <div class="draft-layout">
            <section class="draft-card">
              <label for="communityTitle">标题</label>
              <input class="draft-title-input" id="communityTitle" value="不工作之后想去新西兰生活，怎么判断自己是真的适合，还是只是想逃离现在？">
              <label for="communityBody" style="margin-top:18px">正文</label>
              <textarea class="draft-body-input" id="communityBody">${escapeHtml(defaultCommunityDraftBody())}</textarea>
              <div class="action-row" style="justify-content:flex-start">
                <button class="primary zhihu-button" type="button" data-action="publish-community">发布</button>
                <button class="secondary dark" type="button" data-action="save-community">返回样本库</button>
              </div>
            </section>
          </div>
        </section>
      `;
    }

    function openReader(articleIndex) {
      state.readerArticleIndex = articleIndex;
      state.readerOpen = true;
      state.askPanelOpen = false;
      if (state.page === "paths" && isSampleWallActive()) {
        syncSampleView();
        return;
      }
      if (state.page !== "samples") {
        setPage("samples");
        return;
      }
      syncSampleView();
    }

    function closeReader() {
      state.readerOpen = false;
      state.readerArticleIndex = 0;
      syncSampleView();
    }

    function openAskPanel() {
      const person = getPerson();
      if (!hasPersonaChatPublicContent(person)) {
        showToast(PERSONA_CHAT_INSUFFICIENT_MESSAGE);
        return;
      }
      state.questionText = buildQuestionText(person);
      state.askPanelOpen = true;
      state.readerOpen = false;
      if (state.page === "paths" && isSampleWallActive()) {
        syncSampleView();
        return;
      }
      if (state.page !== "samples") {
        setPage("samples");
        return;
      }
      syncSampleView();
    }

    function closeAskPanel() {
      state.askPanelOpen = false;
      syncSampleView();
    }

    function selectPerson(id) {
      state.selectedPersonId = id;
      state.selectedSavedSampleId = "";
      state.readerArticleIndex = 0;
      state.readerOpen = false;
      state.askPanelOpen = false;
      if (isSampleWallActive()) {
        syncSampleView();
        return;
      }
      render();
    }

    function syncSampleView() {
      const stage = document.querySelector(".sample-wall-panel, .sample-stage");
      if (!stage) return;
      stage.outerHTML = renderSampleStage();
      bindEvents();
    }

    function isMockSaveContext(person) {
      return Boolean(
        window.LIFE_PATH_FORCE_MOCK ||
        API_CONFIG.useMockFallback ||
        state.backendStatus === "mock" ||
        state.queryId === "mock_query" ||
        person?.raw?.queryId === "mock_query"
      );
    }

    function findSaveAnimationSource(trigger) {
      return trigger?.closest(".person-card, .chat-side, .sample-wall-panel")?.querySelector("img") ||
        document.querySelector(".person-card .card-peep img, .chat-peep-card img, .sample-entry-card.is-selected img, .sample-person.is-selected img");
    }

    function runSaveAnimation(person, trigger) {
      const sourceNode = findSaveAnimationSource(trigger);
      const sourceRect = sourceNode?.getBoundingClientRect();
      const triggerRect = trigger?.getBoundingClientRect();
      const libraryButton = document.querySelector('.topbar [data-action="library"]');
      const targetRect = libraryButton?.getBoundingClientRect();
      const sourceVisible = sourceRect &&
        sourceRect.bottom > 0 &&
        sourceRect.top < window.innerHeight &&
        sourceRect.right > 0 &&
        sourceRect.left < window.innerWidth;
      const sourceCenterX = sourceVisible ? sourceRect.left + sourceRect.width / 2 : (triggerRect ? triggerRect.left + triggerRect.width / 2 : window.innerWidth - 176);
      const sourceCenterY = sourceVisible ? sourceRect.top + sourceRect.height / 2 : (triggerRect ? triggerRect.top + triggerRect.height / 2 : 172);
      const targetCenterX = targetRect ? targetRect.left + targetRect.width / 2 : window.innerWidth - 110;
      const targetCenterY = targetRect ? targetRect.top + targetRect.height / 2 : 43;
      const dx = targetCenterX - sourceCenterX;
      const dy = targetCenterY - sourceCenterY;
      const el = document.createElement("div");
      el.className = "save-animation";
      el.style.setProperty("--save-start-x", `${Math.round(sourceCenterX - 36)}px`);
      el.style.setProperty("--save-start-y", `${Math.round(sourceCenterY - 44)}px`);
      el.style.setProperty("--save-dx", `${Math.round(dx)}px`);
      el.style.setProperty("--save-dy", `${Math.round(dy)}px`);
      el.style.setProperty("--save-mid-x", `${Math.round(dx * 0.18)}px`);
      el.style.setProperty("--save-mid-y", `${Math.round(dy * 0.14 - 28)}px`);
      el.style.setProperty("--save-near-x", `${Math.round(dx * 0.88)}px`);
      el.style.setProperty("--save-near-y", `${Math.round(dy * 0.88 - 10)}px`);
      el.innerHTML = avatarImg(person.avatar, 0, "", person.name);
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function savePerson(trigger = null) {
      const person = state.selectedPersonId ? getPerson(state.selectedPersonId) : null;
      const question = state.submittedQuestion || state.question;
      if (!state.hasSubmittedQuestion || !question || !person?.id) {
        showToast("请先完成一次寻找，再保存样本");
        return;
      }
      if (isMockSaveContext(person)) {
        showToast("Demo 样本不会存入我的样本库");
        return;
      }
      if (isPersonSaved(person)) {
        showToast("已在我的样本库中");
        return;
      }
      if (!state.savedQuestionGroups) state.savedQuestionGroups = [];
      const now = Date.now();
      let group = state.savedQuestionGroups.find((item) => item.question === question);
      if (!group) {
        group = {
          id: `q_${now}`,
          question,
          createdAt: now,
          lastSavedAt: now,
          samples: []
        };
        state.savedQuestionGroups.unshift(group);
      }
      const savedPerson = serializePersonForLibrary(person);
      const savedPath = serializePathForLibrary(getPath(person.pathId));
      const existingSample = group.samples.find((item) => isSavedSampleForPerson(item, person));
      if (!existingSample) {
        group.samples.unshift({
          sampleId: `s_${now}_${slugify(person.id, "person")}`,
          personId: person.id,
          savedAt: now,
          queryId: state.queryId || "",
          person: savedPerson,
          path: savedPath
        });
        group.lastSavedAt = now;
      } else {
        existingSample.person = savedPerson;
        existingSample.path = savedPath;
        existingSample.queryId = existingSample.queryId || state.queryId || "";
      }
      persistSavedQuestionGroups();
      if (!window.LIFE_PATH_FORCE_MOCK) {
        postJson(API_CONFIG.saveEndpoint, { queryId: state.queryId, query: question, personId: person.id }).catch(() => {});
      }
      runSaveAnimation(person, trigger);
      const libraryButton = document.querySelector('[data-action="library"]');
      if (libraryButton) {
        libraryButton.classList.add("is-bouncing");
        setTimeout(() => libraryButton.classList.remove("is-bouncing"), 700);
      }
      showToast("已存入我的样本库");
      if (state.page === "chat") render();
      else if (isSampleWallActive()) syncSampleView();
      else render();
    }

    function showToast(text) {
      toastRoot.innerHTML = `<div class="toast">${text}</div>`;
      setTimeout(() => { toastRoot.innerHTML = ""; }, 2400);
    }

    function readInlineQuestion() {
      const editable = document.getElementById("inlineQuestionText");
      if (!editable) return state.questionText;
      return editable.value.trim() || state.questionText;
    }

    async function addChat(text) {
      const question = text.trim();
      if (!question || state.aiTyping) return;
      const person = getPerson();
      if (!hasPersonaChatPublicContent(person)) {
        state.chatDraft = "";
        showToast(PERSONA_CHAT_INSUFFICIENT_MESSAGE);
        if (state.page === "chat") render();
        return;
      }
      state.messages.push({ role: "user", text: question });
      state.chatDraft = "";
      state.aiTyping = true;
      render();
      try {
        const response = await postJson(API_CONFIG.chatEndpoint, buildPersonaChatRequest(person, question));
        const body = getResponseBody(response) || {};
        const reply = extractPersonaChatAnswer(body);
        if (!reply) throw new Error("Persona chat response did not include an answer");
        state.messages.push({ role: "ai", text: reply });
        state.chatDraft = "";
      } catch (error) {
        console.warn("Persona chat API unavailable.", error);
        state.chatDraft = "";
        state.messages.push({ role: "ai", text: PERSONA_CHAT_FAILURE_MESSAGE });
      }
      state.aiTyping = false;
      render();
    }

    function bindEvents() {
      const homeInput = document.getElementById("questionInput");
      if (homeInput && homeInput.dataset.boundInput !== "true") {
        const card = homeInput.closest(".question-card");
        const updateInputState = () => {
          card?.classList.toggle("has-value", Boolean(homeInput.value.trim()));
        };
        homeInput.dataset.boundInput = "true";
        homeInput.addEventListener("focus", () => {
          state.homeInputTouched = true;
          card?.classList.add("is-editing");
        });
        homeInput.addEventListener("input", () => {
          updateInputState();
          state.needClarification = false;
          state.clarificationQuestion = "";
          state.clarificationOptions = [];
          state.clarificationAnswer = "";
          state.clarificationShown = false;
        });
        updateInputState();
      }
      const chatInput = document.getElementById("chatInput");
      if (chatInput && chatInput.dataset.boundInput !== "true") {
        const resizeChatInput = () => {
          chatInput.style.height = "auto";
          chatInput.style.height = `${Math.min(chatInput.scrollHeight, 138)}px`;
        };
        chatInput.dataset.boundInput = "true";
        chatInput.addEventListener("input", () => {
          state.chatDraft = chatInput.value;
          resizeChatInput();
        });
        chatInput.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" || event.shiftKey) return;
          event.preventDefault();
          if (state.aiTyping) return;
          const nextText = chatInput.value.trim();
          if (!nextText) return;
          addChat(chatInput.value);
        });
        resizeChatInput();
      }
      document.querySelectorAll(".sample-person[data-action='select-person']").forEach((node) => {
        if (node.dataset.pointerBound === "true") return;
        node.dataset.pointerBound = "true";
        node.addEventListener("pointerdown", () => selectPerson(node.dataset.id));
      });
      document.querySelectorAll("[data-action]").forEach((node) => {
        if (node.dataset.bound === "true") return;
        node.dataset.bound = "true";
        node.addEventListener("click", (event) => {
          const target = event.target.closest("[data-action]");
          if (!target) return;
          const action = target.dataset.action;
          event.preventDefault();
          if (action === "home") setPage("home");
          if (action === "profile") {
            const user = state.user || mockZhihuUser;
            window.open(user.profileUrl, "_blank", "noopener");
          }
          if (action === "paths") setPage("paths");
          if (action === "library") openLibrary();
          if (action === "library-back") returnFromLibrary();
          if (action === "samples") {
            if (state.pathExpanded || isDirectPeopleResult()) setPage("paths");
            else setPage("samples");
          }
          if (action === "community") setPage("community");
          if (action === "start") {
            handleStartQuery();
          }
          if (action === "submit-clarification") {
            submitClarification(target.dataset.answer || "");
          }
          if (action === "skip-clarification") {
            skipClarification();
          }
          if (action === "retry-search") {
            state.searchError = "";
            startLoading();
          }
          if (action === "choose-path") {
            const card = target.closest(".path-card");
            const showcase = card?.closest(".path-showcase");
            const selectedPathId = target.dataset.id;
            const pathPeopleList = peopleForPath(selectedPathId);
            state.selectedPathId = selectedPathId;
            state.pathExpanded = true;
            state.selectedPersonId = pathPeopleList.length === 1 ? pathPeopleList[0].id : "";
            state.selectedSavedSampleId = "";
            state.readerOpen = false;
            state.readerArticleIndex = 0;
            state.askPanelOpen = false;
            if (card && showcase) {
              card.classList.add("is-selected");
              showcase.classList.add("is-transitioning");
              window.setTimeout(() => {
                render();
                requestAnimationFrame(() => {
                  document.getElementById("expandedPathSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
                });
              }, 170);
            } else {
              render();
              requestAnimationFrame(() => {
                document.getElementById("expandedPathSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
              });
            }
          }
          if (action === "select-person") {
            selectPerson(target.dataset.id);
          }
          if (action === "continue-people") {
            state.selectedPersonId = "";
            state.readerOpen = false;
            state.askPanelOpen = false;
            syncSampleView();
          }
          if (action === "open-reader") openReader(Number(target.dataset.articleIndex || target.dataset.index || 0));
          if (action === "close-reader") closeReader();
          if (action === "ask-person" || action === "question-from-reader") {
            openAskPanel();
          }
          if (action === "mock-dm-from-inline-ask") {
            state.questionText = readInlineQuestion();
            showToast("暂时不能真实私信 TA，可以先基于公开内容追问。");
          }
          if (action === "chat-from-inline-ask") {
            state.questionText = readInlineQuestion();
            if (!hasPersonaChatPublicContent(getPerson())) {
              showToast(PERSONA_CHAT_INSUFFICIENT_MESSAGE);
              return;
            }
            state.messages = [];
            state.askPanelOpen = false;
            state.chatDraft = "";
            setPage("chat");
            addChat(state.questionText);
          }
          if (action === "close-inline-ask") closeAskPanel();
          if (action === "quick-chat") addChat(target.dataset.text || "");
          if (action === "send-chat") {
            const input = document.getElementById("chatInput");
            addChat(input ? input.value : state.chatDraft);
          }
          if (action === "save-person") savePerson(target);
          if (action === "open-saved") {
            state.selectedSavedSampleId = target.dataset.sampleId || "";
            state.selectedPersonId = target.dataset.id;
            state.selectedPathId = getPerson(state.selectedPersonId).pathId;
            state.readerOpen = false;
            state.readerArticleIndex = 0;
            state.askPanelOpen = false;
            setPage("samples");
          }
          if (action === "open-saved-chat") {
            state.selectedSavedSampleId = target.dataset.sampleId || "";
            state.selectedPersonId = target.dataset.id;
            state.selectedPathId = getPerson(state.selectedPersonId).pathId;
            state.readerOpen = false;
            state.askPanelOpen = false;
            state.messages = [];
            state.chatDraft = "";
            if (!hasPersonaChatPublicContent(getPerson(state.selectedPersonId))) {
              showToast(PERSONA_CHAT_INSUFFICIENT_MESSAGE);
              return;
            }
            setPage("chat");
          }
          if (action === "publish-community") {
            if (!state.loggedIn) {
              redirectToZhihuLogin();
            } else {
              showToast("Demo 不会真实发布。正式版会打开知乎圈子编辑器。");
            }
          }
          if (action === "save-community") {
            if (state.pathExpanded || isDirectPeopleResult()) setPage("paths");
            else setPage("samples");
          }
        });
      });
    }

    async function bootstrap() {
      const ok = await checkSession();
      if (ok) render();
    }

    bootstrap();
  </script>
</body>
</html>
