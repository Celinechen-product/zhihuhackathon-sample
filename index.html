<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生样本库 | Demo</title>
  <style>
    :root {
      --bg: #fbf7ef;
      --bg-2: #f7f1e7;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: #ffffff;
      --line: rgba(38, 35, 31, 0.08);
      --line-strong: rgba(38, 35, 31, 0.16);
      --text: #26231f;
      --muted: #6f685f;
      --faint: #9a9287;
      --ink: #26231f;
      --paper: #fffdf8;
      --paper-2: #ffffff;
      --warm: #d7a14a;
      --warm-2: #f2c86b;
      --accent-warm: #d89a45;
      --accent-warm-soft: #fff1c7;
      --blue: #1772f6;
      --green: #3f8a71;
      --green-soft: #e6f1ec;
      --shadow: 0 16px 44px rgba(52, 43, 32, 0.07);
      --shadow-card: 0 22px 70px rgba(52, 43, 32, 0.1);
      --ease: cubic-bezier(0.2, 0.82, 0.2, 1);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 1180px;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 244, 219, 0.72), transparent 38%),
        linear-gradient(180deg, #fbf7ef 0%, #f7f1e7 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body[data-page="loading"],
    body[data-page="paths"] {
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: #ffffff;
      --line: rgba(38, 35, 31, 0.08);
      --line-strong: rgba(38, 35, 31, 0.16);
      --text: #26231f;
      --muted: #6f685f;
      --faint: #9a9287;
      --ink: #26231f;
      --shadow: 0 16px 44px rgba(52, 43, 32, 0.07);
      color-scheme: light;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 52px;
      pointer-events: none;
    }

    .brand,
    .nav-pill {
      pointer-events: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 0;
      color: var(--text);
      background: transparent;
      font-weight: 850;
      letter-spacing: 0;
    }

    .brand-mark {
      position: relative;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffdf8;
      color: var(--accent-warm);
      box-shadow: 0 12px 28px rgba(52, 43, 32, 0.06);
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      width: 10px;
      height: 10px;
      transform: translateX(-50%);
      border: 2px solid currentColor;
      border-radius: 50%;
      background: #fff;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 19px;
      height: 13px;
      transform: translateX(-50%);
      border: 2px solid currentColor;
      border-bottom: 0;
      border-radius: 13px 13px 0 0;
      background: rgba(255, 241, 199, 0.72);
    }

    .brand span:last-child {
      font-size: 18px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .nav-pill {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.64);
      backdrop-filter: blur(16px);
      transition: 180ms ease;
    }

    .nav-pill:hover {
      color: var(--text);
      border-color: rgba(216, 154, 69, 0.28);
      background: #fff;
      transform: translateY(-1px);
    }

    .auth-slot {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 38px;
    }

    .auth-avatar-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .avatar-button {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(38, 35, 31, 0.12);
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(52, 43, 32, 0.08);
    }

    .avatar-button img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-skeleton {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(38, 35, 31, 0.12);
      border-top-color: var(--accent-warm);
      border-radius: 50%;
      animation: spin 760ms linear infinite;
    }

    .auth-avatar-popover {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 148px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: 160ms ease;
    }

    .auth-avatar-popover strong,
    .auth-avatar-popover span {
      display: block;
      line-height: 1.5;
      white-space: nowrap;
    }

    .auth-avatar-popover span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .auth-avatar-wrap:hover .auth-avatar-popover,
    .auth-avatar-wrap:focus-within .auth-avatar-popover {
      opacity: 1;
      transform: translateY(0);
    }

    body[data-page="loading"] .nav-pill,
    body[data-page="paths"] .nav-pill {
      color: var(--muted);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    body[data-page="loading"] .nav-pill:hover,
    body[data-page="paths"] .nav-pill:hover {
      color: var(--text);
      border-color: rgba(216, 154, 69, 0.32);
      background: #fff;
    }

    .screen {
      position: relative;
      min-height: 100vh;
      padding: 92px 52px 42px;
      overflow: hidden;
      animation: screenIn 620ms var(--ease) both;
    }

    .center-stack {
      position: relative;
      z-index: 10;
      width: min(1040px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(58px, 8vw, 126px);
      line-height: 0.95;
      color: var(--text);
      font-weight: 850;
    }

    h2 {
      font-size: 42px;
      line-height: 1.12;
      font-weight: 900;
    }

    p {
      margin: 0;
    }

    .lead {
      margin: 22px auto 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.78;
    }

    .hand-underline {
      position: relative;
      display: inline-block;
    }

    .hand-underline::after {
      content: "";
      position: absolute;
      left: 2%;
      right: 0;
      bottom: -8px;
      height: 12px;
      border-bottom: 7px solid rgba(216, 154, 69, 0.58);
      border-radius: 50%;
      transform: rotate(-1.5deg);
      filter: drop-shadow(0 8px 14px rgba(216, 154, 69, 0.12));
    }

    .question-card {
      position: relative;
      width: min(860px, 100%);
      margin: 34px auto 0;
      padding: 0;
      border: 1px solid rgba(42, 36, 28, 0.12);
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(52, 43, 32, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .question-card:focus-within {
      border-color: rgba(216, 154, 69, 0.24);
      box-shadow: 0 24px 70px rgba(52, 43, 32, 0.1), 0 0 0 5px rgba(255, 241, 199, 0.28);
      background: rgba(255, 255, 255, 0.9);
    }

    .question-input {
      display: block;
      width: 100%;
      min-height: 210px;
      resize: none;
      padding: 30px 96px 34px 32px;
      border: 0;
      outline: 0;
      border-radius: 28px;
      color: var(--text);
      background: transparent;
      box-shadow: none;
      font-size: 21px;
      line-height: 1.75;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .question-input:focus {
      box-shadow: none;
    }

    .query-placeholder {
      position: absolute;
      left: 32px;
      top: 30px;
      right: 96px;
      z-index: 1;
      color: rgba(38, 35, 31, 0.34);
      font-size: 19px;
      font-weight: 400;
      line-height: 1.75;
      text-align: left;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .question-card.is-editing .query-placeholder,
    .question-card.has-value .query-placeholder {
      opacity: 0;
      transform: translateY(-4px);
    }

    .send-query {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 0;
      border-radius: 50%;
      color: #ffffff;
      background: linear-gradient(135deg, #e5a151, #c97a32);
      box-shadow: 0 18px 38px rgba(216, 154, 69, 0.24);
      font-size: 28px;
      line-height: 1;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .send-query:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      box-shadow: 0 22px 46px rgba(216, 154, 69, 0.28);
    }

    .clarification-checking {
      width: min(860px, 100%);
      margin: 14px auto 0;
      color: var(--faint);
      font-size: 14px;
      line-height: 1.6;
    }

    .clarification-card {
      width: min(860px, 100%);
      margin: 18px auto 0;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 16px 44px rgba(52, 43, 32, 0.07);
      text-align: left;
      animation: fadeUp 360ms var(--ease) both;
    }

    .clarification-kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .clarification-card h3 {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.45;
      font-weight: 900;
    }

    .clarification-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .clarification-option {
      min-height: 40px;
      padding: 9px 14px;
      border: 1px solid rgba(216, 154, 69, 0.28);
      border-radius: 999px;
      color: #6f5a2b;
      background: transparent;
      font-weight: 800;
      transition: 180ms ease;
    }

    .clarification-option:hover {
      color: #3f2b0f;
      border-color: rgba(216, 154, 69, 0.46);
      background: rgba(255, 241, 199, 0.22);
      transform: translateY(-1px);
    }

    .clarification-skip {
      margin-top: 14px;
      padding: 0;
      border: 0;
      color: rgba(111, 104, 95, 0.72);
      background: transparent;
      font-size: 14px;
      font-weight: 800;
    }

    .clarification-skip:hover {
      color: #6f5a2b;
    }

    .hint {
      margin-top: 12px;
      color: var(--faint);
      font-size: 14px;
    }

    .primary,
    .secondary,
    .text-button {
      border: 1px solid transparent;
      transition: transform 180ms ease, filter 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      padding: 14px 26px;
      border-radius: 999px;
      color: #3f2b0f;
      background: linear-gradient(135deg, var(--accent-warm-soft), #f0c977);
      font-weight: 900;
      box-shadow: 0 18px 40px rgba(216, 154, 69, 0.18);
    }

    .primary.warm {
      color: #3f2b0f;
      background: linear-gradient(135deg, var(--accent-warm-soft), #f0c977);
      box-shadow: 0 18px 40px rgba(216, 154, 69, 0.18);
    }

    .primary:hover,
    .secondary:hover,
    .text-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 17px;
      border: 1px solid rgba(216, 154, 69, 0.28);
      border-radius: 999px;
      color: #6f5a2b;
      background: transparent;
      font-weight: 800;
    }

    .secondary.dark {
      color: #6f5a2b;
      border-color: rgba(216, 154, 69, 0.28);
      background: transparent;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 15px;
      border: 1px solid rgba(216, 154, 69, 0.28);
      border-radius: 999px;
      color: #6f5a2b;
      background: transparent;
      font-weight: 800;
    }

    .secondary:hover,
    .text-button:hover {
      color: #3f2b0f;
      border-color: rgba(216, 154, 69, 0.46);
      background: rgba(255, 241, 199, 0.22);
    }

    .secondary:disabled,
    .text-button:disabled {
      color: rgba(111, 104, 95, 0.48);
      border-color: rgba(111, 104, 95, 0.14);
      background: rgba(255, 255, 255, 0.28);
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .action-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .crowd-stage {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30vh;
      min-height: 220px;
      max-height: 285px;
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
      border-top: 1px solid rgba(38, 35, 31, 0.04);
      background:
        linear-gradient(180deg, rgba(251, 247, 239, 0), rgba(255, 255, 255, 0.26) 22%, rgba(247, 241, 231, 0.54) 100%);
      mask-image: linear-gradient(to bottom, transparent 0, #000 13%, #000 100%);
    }

    .crowd-row {
      position: absolute;
      left: 0;
      bottom: var(--bottom);
      display: flex;
      align-items: flex-end;
      gap: var(--gap);
      width: max-content;
      opacity: var(--opacity);
      filter: blur(var(--blur));
      transform: translateX(0);
      animation: crowdWalk var(--speed) linear infinite;
    }

    .crowd-row.reverse {
      animation-direction: reverse;
    }

    .walker {
      position: relative;
      width: var(--w);
      height: var(--h);
      flex: 0 0 auto;
      animation: bob 2.7s ease-in-out infinite;
      animation-delay: var(--delay);
      transform-origin: 50% 100%;
    }

    .walker img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: saturate(0.68) contrast(0.92) drop-shadow(0 12px 18px rgba(52, 43, 32, 0.11));
    }

    .walker .head {
      position: absolute;
      left: 50%;
      top: 0;
      width: calc(var(--w) * 0.66);
      height: calc(var(--w) * 0.72);
      transform: translateX(-50%);
      border: 4px solid #fff;
      border-radius: 48% 46% 54% 44%;
      background: var(--face);
      box-shadow: 0 0 22px rgba(255, 255, 255, 0.18);
    }

    .walker .head::before,
    .walker .head::after {
      content: "";
      position: absolute;
      top: 36%;
      width: 6px;
      height: 8px;
      border-radius: 50%;
      background: #050505;
    }

    .walker .head::before {
      left: 30%;
    }

    .walker .head::after {
      right: 30%;
    }

    .walker .hair {
      position: absolute;
      left: 50%;
      top: -7px;
      width: calc(var(--w) * 0.72);
      height: calc(var(--w) * 0.34);
      transform: translateX(-50%) rotate(var(--hair-rot));
      border-radius: 52% 48% 40% 44%;
      background: #050505;
      border: 3px solid #fff;
      border-bottom: 0;
    }

    .walker .body {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: calc(var(--w) * 0.84);
      height: calc(var(--h) * 0.52);
      transform: translateX(-50%);
      border: 4px solid #fff;
      border-bottom: 0;
      border-radius: 42% 42% 0 0;
      background: var(--shirt);
      box-shadow: inset 0 0 0 1px rgba(38, 35, 31, 0.14);
    }

    .walker .body::before,
    .walker .body::after {
      content: "";
      position: absolute;
      top: 14%;
      width: 4px;
      height: 56%;
      border-radius: 4px;
      background: #fff;
      opacity: 0.8;
    }

    .walker .body::before {
      left: 26%;
      transform: rotate(-10deg);
    }

    .walker .body::after {
      right: 26%;
      transform: rotate(10deg);
    }

    .walker .nose {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 8px;
      height: 14px;
      transform: translateX(-50%) rotate(8deg);
      border-radius: 70% 30% 50% 50%;
      background: var(--warm-2);
    }

    .screen.home {
      min-height: 100vh;
      padding: 72px 52px 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home .center-stack {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding-top: 0;
      transform: translateY(24px);
    }

    .home h1 {
      font-size: clamp(26px, 2.8vw, 40px);
      line-height: 1.18;
      white-space: nowrap;
    }

    .home .lead {
      margin-top: 18px;
      font-size: 22px;
    }

    .home .question-card {
      margin-top: 42px;
    }

    .home .question-input {
      min-height: 210px;
    }

    .home-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 13px;
      border: 1px solid rgba(216, 154, 69, 0.22);
      border-radius: 999px;
      color: var(--accent-warm);
      background: rgba(255, 241, 199, 0.72);
      font-size: 14px;
      font-weight: 800;
    }

    .home-bottom-copy {
      display: none;
    }

    .loading {
      min-height: 100vh;
      padding-bottom: 310px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 244, 219, 0.72), transparent 38%),
        linear-gradient(180deg, #fbf7ef 0%, #f7f1e7 100%);
    }

    .loading-panel {
      position: relative;
      z-index: 12;
      width: min(860px, 100%);
      margin: 8vh auto 0;
      padding: 32px;
      border: 1px solid rgba(38, 35, 31, 0.08);
      border-radius: 28px;
      text-align: left;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 22px 70px rgba(52, 43, 32, 0.1);
      backdrop-filter: blur(10px);
    }

    .loading-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .loading-title h1 {
      font-size: 40px;
      line-height: 1.12;
    }

    .pulse-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--warm);
      box-shadow: 0 0 0 0 rgba(244, 211, 94, 0.6);
      animation: pulse 1.6s ease infinite;
    }

    .fingerprint-steps {
      display: grid;
      gap: 12px;
    }

    .fingerprint-step {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      opacity: 0.48;
      transform: translateY(8px);
      transition: opacity 260ms ease, transform 260ms ease, border-color 260ms ease;
      line-height: 1.68;
    }

    .fingerprint-step.is-active,
    .fingerprint-step.is-done {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(215, 161, 74, 0.24);
      background: rgba(255, 253, 248, 0.88);
    }

    .fingerprint-step strong {
      color: var(--text);
    }

    .loading .crowd-stage {
      top: auto;
      bottom: 18px;
      height: 32vh;
      min-height: 285px;
      max-height: none;
      z-index: 8;
      border-top: 0;
      background:
        linear-gradient(180deg, rgba(251, 247, 239, 0), rgba(255, 255, 255, 0.18) 18%, rgba(247, 241, 231, 0.58) 100%);
      mask-image: linear-gradient(to bottom, transparent 0, #000 8%, #000 100%);
    }

    .loading .walker img {
      filter: saturate(0.74) contrast(0.96) drop-shadow(0 14px 20px rgba(52, 43, 32, 0.12));
    }

    body[data-page="loading"] .crowd-row {
      animation: loadingCrowdWalk var(--speed) linear infinite;
    }

    body[data-page="loading"] .crowd-row.reverse {
      animation-direction: reverse;
    }

    body[data-page="loading"] .walker {
      animation: bob 2.7s ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .paths-screen {
      padding-top: 72px;
      color: var(--text);
      background:

    function toArray(value) {
      if (Array.isArray(value)) return value;

    }

    function textOf(value, fallback = "") {
      if (value === undefined || value === null) return fallback;
      return String(value);
    }

    function numberOf(value, fallback = 0) {
      const next = Number(value);
      return Number.isFinite(next) ? next : fallback;
    }

    function slugify(value, fallback) {
      const text = textOf(value).trim();
      if (!text) return fallback;
      return text
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\w\u4e00-\u9fa5-]/g, "")
        .slice(0, 32) || fallback;
    }

    function normalizePath(item = {}, index = 0) {
      const name = item.name || item.title || item.label || item.pathName || `路径 ${index + 1}`;
      return {
        id: textOf(item.id || item.pathId || item.path_id || item.routeId || item.route_id || item.slug || slugify(name, `path_${index + 1}`)),

    function normalizeTimeline(value) {

    function normalizeArticle(item, index = 0, person = {}) {
      if (typeof item === "string") {
        return {

    function normalizeSavedQuestionGroup(item = {}, groupIndex = 0) {
      const question = textOf(item.question).trim();
      if (!question) return null;
      const groupTime = numberOf(item.lastSavedAt || item.last_saved_at || item.createdAt || item.created_at, Date.now() - groupIndex);
      const samples = toArray(item.samples).map((sample = {}, sampleIndex) => {
        if (sample.isMock || sample.queryId === "mock_query" || sample.query_id === "mock_query") return null;
        const savedPerson = sample.person ? normalizePerson(sample.person, sampleIndex, sample.person.pathId || sample.person.path_id || sample.path?.id || "") : null;
        const personId = textOf(sample.personId || sample.person_id || savedPerson?.id);
        if (!personId) return null;
        const savedPath = sample.path ? serializePathForLibrary(sample.path) : null;
        return {
          sampleId: textOf(sample.sampleId || sample.sample_id || `saved_${slugify(question, "q")}_${slugify(personId, `p_${sampleIndex}`)}`),
          personId,
          savedAt: numberOf(sample.savedAt || sample.saved_at, groupTime - sampleIndex),
          queryId: textOf(sample.queryId || sample.query_id || ""),
          person: savedPerson ? serializePersonForLibrary(savedPerson) : null,
          path: savedPath
        };
      }).filter(Boolean);
      return {
        id: textOf(item.id || `q_${groupTime}_${groupIndex}`),
        question,
        createdAt: numberOf(item.createdAt || item.created_at, groupTime),
        lastSavedAt: numberOf(item.lastSavedAt || item.last_saved_at, groupTime),
        samples
      };
    }

    function loadSavedQuestionGroups() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.savedQuestionGroups);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return toArray(parsed).map(normalizeSavedQuestionGroup).filter(Boolean);
      } catch (error) {
        console.warn("Saved library restore failed.", error);
        return [];
      }
    }

    function persistSavedQuestionGroups() {
      try {
        const groups = (state.savedQuestionGroups || [])
          .map(normalizeSavedQuestionGroup)
          .filter((group) => group && group.samples.length);
        state.savedQuestionGroups = groups;
        localStorage.setItem(STORAGE_KEYS.savedQuestionGroups, JSON.stringify(groups));
      } catch (error) {
        console.warn("Saved library persist failed.", error);
      }
    }

    function normalizeSaveMatchUrl(value) {
      return textOf(value).trim().replace(/\/+$/, "");
    }

    function getSavedSampleSourceUrl(sample = {}) {
      return normalizeSaveMatchUrl(sample.person?.source?.url || sample.person?.sourceUrl || sample.person?.source_url || sample.source?.url || sample.sourceUrl || "");
    }

    function isSavedSampleForPerson(sample, person) {
      if (!sample || !person?.id) return false;
      const personSourceUrl = normalizeSaveMatchUrl(getPersonSourceUrl(person));
      const sampleSourceUrl = getSavedSampleSourceUrl(sample);
      if (personSourceUrl && sampleSourceUrl) return personSourceUrl === sampleSourceUrl;
      return sample.personId === person.id || sample.person?.id === person.id;
    }

    function findSavedSampleForPerson(person) {
      if (!person?.id) return null;
      for (const group of state.savedQuestionGroups || []) {
        for (const sample of toArray(group.samples)) {
          if (isSavedSampleForPerson(sample, person)) return sample;
        }
      }
      return null;
    }

    function isPersonSaved(person) {
      return Boolean(findSavedSampleForPerson(person));
    }

    function normalizeSavedPersonFromSample(sample, index = 0) {
      if (!sample?.person) return null;
      return normalizePerson(sample.person, index, sample.person.pathId || sample.person.path_id || sample.path?.id || "");
    }

    function getSavedSample(sampleId) {
      if (!sampleId) return null;
      for (const group of state.savedQuestionGroups || []) {
        const found = toArray(group.samples).find((sample) => sample.sampleId === sampleId);
        if (found) return found;
      }
      return null;
    }

    function getSavedPerson(id) {
      const selectedSample = getSavedSample(state.selectedSavedSampleId);
      if (selectedSample && (!id || selectedSample.personId === id)) {
        const selectedPerson = normalizeSavedPersonFromSample(selectedSample);
        if (selectedPerson) return selectedPerson;
      }
      for (const group of state.savedQuestionGroups || []) {
        for (const [index, sample] of toArray(group.samples).entries()) {
          if (sample.personId !== id) continue;
          const person = normalizeSavedPersonFromSample(sample, index);
          if (person) return person;
        }
      }
      return null;
    }

    function getSavedPath(id) {
      const selectedSample = getSavedSample(state.selectedSavedSampleId);
      if (selectedSample?.path && (!id || selectedSample.path.id === id || selectedSample.person?.pathId === id)) {
        return normalizePath(selectedSample.path);
      }
      for (const group of state.savedQuestionGroups || []) {
        for (const sample of toArray(group.samples)) {
          if (!sample.path) continue;
          if (!id || sample.path.id === id || sample.person?.pathId === id) return normalizePath(sample.path);
        }
      }
      return null;
    }

    function getSavedPeopleForPath(pathId) {
      const saved = [];
      for (const group of state.savedQuestionGroups || []) {
        for (const [index, sample] of toArray(group.samples).entries()) {
          const person = normalizeSavedPersonFromSample(sample, index);
          if (person && person.pathId === pathId) saved.push(person);
        }
      }
      return saved;
    }

    function getLibrarySamplePerson(sample) {
      return normalizeSavedPersonFromSample(sample) || people.find((person) => person.id === sample.personId) || null;
    }

    function getDisplayPathDesc(path) {
      const desc = textOf(path?.desc || "");
      if (!desc) {
        const name = textOf(path?.name || "");
        if (/求职|找工作|回到|就业/.test(name)) return "他们大多回到求职轨道，在投简历、面试和岗位预期之间重新找位置。";
        if (/暂停|休息|恢复|观察|停下来/.test(name)) return "他们先停下来恢复状态，再慢慢观察职业方向和下一步行动。";
        return "";
      }
      return desc
        .replace(/^这些样本主要/, "他们大多")
        .replace(/^这些样本大多/, "他们大多")
        .replace(/^这些样本/, "他们")
        .replace(/这些样本/g, "他们");
    }

    function getSearchFailureMessage(error) {
      const message = textOf(error?.message || error?.name || "");
      if (error?.name === "AbortError" || /abort|timeout|timed out/i.test(message)) {
        return "这次寻找真实经历花得有点久，可以稍后重试。";
      }
      return "这次没有成功连上真实结果，可以稍后重试。";
    }

    function capturePageState() {
      return {
        page: state.page,
        question: state.question,
        submittedQuestion: state.submittedQuestion,
        hasSubmittedQuestion: state.hasSubmittedQuestion,
        queryType: state.queryType,
        selectedPathId: state.selectedPathId,
        selectedPersonId: state.selectedPersonId,
        selectedSavedSampleId: state.selectedSavedSampleId,
        pathExpanded: state.pathExpanded,
        readerOpen: state.readerOpen,
        readerArticleIndex: state.readerArticleIndex,
        askPanelOpen: state.askPanelOpen,
        questionText: state.questionText,
        messages: clonePlain(state.messages, []),
        chatDraft: state.chatDraft,
        backendStatus: state.backendStatus,
        searchError: state.searchError
      };
    }

    function restorePageState(snapshot) {
      if (!snapshot) return false;
      state.page = snapshot.page || "home";
      state.question = snapshot.question || state.question;
      state.submittedQuestion = snapshot.submittedQuestion || "";
      state.hasSubmittedQuestion = Boolean(snapshot.hasSubmittedQuestion);
      state.queryType = snapshot.queryType || "";
      state.selectedPathId = snapshot.selectedPathId || "";
      state.selectedPersonId = snapshot.selectedPersonId || "";
      state.selectedSavedSampleId = snapshot.selectedSavedSampleId || "";
      state.pathExpanded = Boolean(snapshot.pathExpanded);
      state.readerOpen = Boolean(snapshot.readerOpen);
      state.readerArticleIndex = numberOf(snapshot.readerArticleIndex, 0);
      state.askPanelOpen = Boolean(snapshot.askPanelOpen);
      state.questionText = snapshot.questionText || defaultQuestionText();
      state.messages = clonePlain(snapshot.messages, []);
      state.chatDraft = snapshot.chatDraft || "";
      state.aiTyping = false;
      state.backendStatus = snapshot.backendStatus || state.backendStatus;
      state.searchError = snapshot.searchError || "";
      return true;
    }

    function openLibrary() {
      if (state.page !== "library") {
        state.previousPage = state.page;
        state.previousState = capturePageState();
      }
      setPage("library");
    }

    function returnFromLibrary() {
      const previousState = state.previousState;
      state.previousPage = "";
      state.previousState = null;
      if (!previousState || !restorePageState(previousState)) {
        setPage("home");
        return;
      }
      clearLoadingTimers();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function normalizeSearchResponse(payload, query) {
      const body = getResponseBody(payload) || {};
      let nextPaths = toArray(body.paths || body.routes || body.directions || body.pathways).map(normalizePath);
      const searchItems = toArray(body.items);
      const nestedPeople = [];
      toArray(body.paths || body.routes || body.directions || body.pathways).forEach((path, pathIndex) => {
        const normalizedPath = nextPaths[pathIndex] || normalizePath(path, pathIndex);
        toArray(path.people || path.samples || path.personas || path.authors).forEach((person) => nestedPeople.push({ person, pathId: normalizedPath.id }));
      });

      const previousPaths = paths;
      if (nextPaths.length) paths = nextPaths;
      let nextPeople = [
        ...toArray(body.people || body.samples || body.personas || body.authors).map((person, index) => normalizePerson(person, index)),
        ...nestedPeople.map(({ person, pathId }, index) => normalizePerson(person, index, pathId)),
        ...searchItems.map((item, index) => normalizeSearchItemAsPerson(item, index, nextPaths[index % Math.max(nextPaths.length, 1)]?.id || ""))
      ];
      paths = previousPaths;

      return {
        queryId: textOf(body.queryId || body.query_id || body.id || ""),
        queryType: textOf(body.analysis?.question_type || body.analysis?.questionType || body.queryType || body.query_type || body.debug?.queryContext?.query_type || ""),
        query: textOf(body.query || body.question || query),
        loadingSteps: normalizeLoadingSteps(body.loadingSteps || body.loading_steps),
        analysisSteps: normalizeAnalysisSteps(body.analysis || body, query),
        focusTags: toArray(body.analysis?.focusTags || body.analysis?.focus_tags || body.focusTags || body.focus_tags || body.tags).map(String),
        paths: nextPeople.length ? sortPathsByCount(nextPaths) : [],
        people: nextPeople
      };
    }

    function sortPathsByCount(list) {
      return [...list].sort((a, b) => numberOf(b.count, 0) - numberOf(a.count, 0));
    }

    function getResultModeFor(resultPaths = paths, resultPeople = people) {
      if (!resultPeople.length) return "empty";
      if (resultPaths.length >= 2) return "multi_path";
      if (resultPaths.length === 1 && resultPeople.length === 1) return "single_person";
      if (resultPaths.length === 1 && resultPeople.length > 1) return "single_path";
      if (resultPeople.length === 1) return "people_only_single";
      return "people_only";
    }

    function isDirectPeopleResult(mode = getResultModeFor()) {
      return ["single_path", "single_person", "people_only", "people_only_single"].includes(mode);
    }

    function isSampleWallActive() {
      return state.page === "samples" || (state.page === "paths" && (state.pathExpanded || isDirectPeopleResult()));
    }

    function apiUrl(path) {
      if (/^https?:\/\//.test(String(path))) return String(path);
      if (!API_CONFIG.apiBase) return String(path);
      return new URL(path, API_CONFIG.apiBase).toString();
    }

    function mockSearchPayload(query) {
      return {
        queryId: "mock_query",
        analysis: { steps: defaultAnalysisSteps(query), focusTags: ["身份周期", "现金流", "工作边界", "回流代价"] },
        paths: mockPaths,
        people: mockPeople
      };
    }

    function shouldUseMockSearch() {
      return Boolean(window.LIFE_PATH_FORCE_MOCK || API_CONFIG.useMockFallback);
    }

    function resetSearchResults() {
      paths = [];
      people = [];
      state.queryId = null;
      state.queryType = "";
      state.selectedPathId = "";
      state.selectedPersonId = "";
      state.selectedSavedSampleId = "";
      state.pathExpanded = false;
      state.readerOpen = false;
      state.readerArticleIndex = 0;
      state.askPanelOpen = false;
      state.messages = [];
      state.chatDraft = "";
      state.aiTyping = false;
      state.searchError = "";
    }

    async function postJson(path, payload) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), API_CONFIG.requestTimeoutMs);
      try {
        const response = await fetch(apiUrl(path), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function getJson(path) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), API_CONFIG.requestTimeoutMs);
      try {
        const response = await fetch(apiUrl(path), {
          method: "GET",
          headers: { "Accept": "application/json" },
          credentials: "include",
          signal: controller.signal
        });
        if (!response.ok) {
          const error = new Error(`HTTP ${response.status}`);
          error.status = response.status;
          throw error;
        }
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function requestClarification(query, clarification = "") {
      return await postJson(API_CONFIG.clarifyEndpoint, { query, clarification });
    }

    function normalizeZhihuUser(payload) {
      const body = getResponseBody(payload) || {};
      const user = body.user || body.profile || body.me || body;
      const loggedIn = body.loggedIn ?? body.authenticated ?? body.isLoggedIn ?? Boolean(user?.id || user?.name || user?.avatar);
      if (!loggedIn) return null;
      return {
        id: textOf(user.id || user.userId || user.uid || mockZhihuUser.id),
        name: textOf(user.name || user.username || user.displayName || user.nickname || mockZhihuUser.name),
        avatar: textOf(user.avatar || user.avatarUrl || user.avatar_url || mockZhihuUser.avatar),
        profileUrl: textOf(user.profileUrl || user.profile_url || user.url || user.homepage || mockZhihuUser.profileUrl)
      };
    }

    function applyUser(user, source = "real") {
      state.user = user || mockZhihuUser;
      state.loggedIn = true;
      state.sessionChecked = true;
      state.authSource = source;
    }

    function redirectToZhihuLogin() {
      window.location.href = API_CONFIG.loginUrl;
    }

    async function checkSession() {
      state.sessionChecked = false;
      render();
      try {
        const payload = await getJson(API_CONFIG.meEndpoint);
        const user = normalizeZhihuUser(payload);
        if (user) {
          applyUser(user, "real");
          return true;
        }
        redirectToZhihuLogin();
        return false;
      } catch (error) {
        if (error?.status === 401 || error?.status === 403) {
          redirectToZhihuLogin();
          return false;
        }
        console.warn("Zhihu session API unavailable, using mock user fallback.", error);
        if (API_CONFIG.useMockUserFallback) {
          applyUser(mockZhihuUser, "mock");
          return true;
        }
        redirectToZhihuLogin();
        return false;
      }
    }

    function applySearchData(data, query) {
      paths = sortPathsByCount(data.paths);
      people = data.people;
      const resultMode = getResultModeFor(paths, people);
      const onlyPath = paths.length === 1 ? paths[0] : null;
      const onlyPerson = people.length === 1 ? people[0] : null;
      state.queryId = data.queryId || null;
      state.queryType = data.queryType || "";
      state.loadingSteps = data.loadingSteps.length ? data.loadingSteps : state.loadingSteps;
      state.analysisSteps = data.analysisSteps.length ? data.analysisSteps : defaultAnalysisSteps(query);
      state.focusTags = data.focusTags.length ? data.focusTags : ["身份周期", "现金流", "工作边界", "回流代价"];
      state.selectedPathId = onlyPath?.id || "";
      state.selectedPersonId = resultMode === "single_person" || resultMode === "people_only_single" ? onlyPerson?.id || "" : "";
      state.pathExpanded = false;
      state.readerOpen = false;
      state.readerArticleIndex = 0;
      state.askPanelOpen = false;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getPath(id = state.selectedPathId) {
      return paths.find((item) => item.id === id) || getSavedPath(id) || paths[0] || normalizePath({ name: "未知路径" });
    }

    function getPerson(id = state.selectedPersonId) {
      const selectedSavedPerson = state.selectedSavedSampleId ? getSavedPerson(id) : null;
      return selectedSavedPerson || people.find((item) => item.id === id) || getSavedPerson(id) || people[0] || normalizePerson({ name: "未知样本" });
    }

    function getProfileUrl(person) {
      return textOf(person.sourceUrl || person.source?.url || "");
    }

    function peopleForPath(pathId = state.selectedPathId) {
      const matched = people.filter((person) => person.pathId === pathId);
      const seen = new Set(matched.map((person) => person.id));
      const saved = getSavedPeopleForPath(pathId).filter((person) => {
        if (seen.has(person.id)) return false;
        seen.add(person.id);
        return true;
      });
      return [...matched, ...saved];
    }

    function visiblePeopleForPath(pathId) {
      return peopleForPath(pathId);
    }

    function setPage(page) {
      clearLoadingTimers();
      if (page !== "chat") {
        state.aiTyping = false;
      }
      if (page !== "samples") {
        state.readerOpen = false;
        state.readerArticleIndex = 0;
        state.askPanelOpen = false;
      }
      state.page = page;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearLoadingTimers() {
      loadingTimers.forEach((timer) => clearTimeout(timer));
      loadingTimers = [];
    }

    function render() {
      clearSpotlightTimer();
      clearHomePromptTimer();
      document.body.dataset.page = state.page;
      const views = {
        home: renderHome,
        loading: renderLoading,
        paths: renderPaths,
        samples: renderSamples,
        chat: renderChat,
        library: renderLibrary,
        community: renderCommunityDraft
      };
      app.innerHTML = (views[state.page] || renderHome)();
      updateTopbar();
      bindEvents();
      setupSpotlight();
      setupHomePromptRotation();
    }

    function clearSpotlightTimer() {
      if (spotlightTimer) clearInterval(spotlightTimer);
      spotlightTimer = null;
    }

    function clearHomePromptTimer() {
      if (homePromptTimer) clearInterval(homePromptTimer);
      homePromptTimer = null;
    }

    function setupHomePromptRotation() {
      if (state.page !== "home" || state.homeInputTouched) return;
      homePromptTimer = setInterval(() => {
        const input = document.getElementById("questionInput");
        const placeholder = document.getElementById("queryPlaceholder");
        if (!input || !placeholder || input.value.trim() || state.homeInputTouched) return;
        state.promptIndex = (state.promptIndex + 1) % queryPrompts.length;
        const next = queryPrompts[state.promptIndex];
        input.dataset.prompt = next;
        placeholder.textContent = next;
      }, 2600);
    }

    function setupSpotlight() {
      if (state.page !== "samples" && !(state.page === "paths" && state.pathExpanded)) return;
      const stage = document.querySelector(".sample-stage");
      if (!stage) return;
      const staticTrack = stage.querySelector(".sample-track.is-static-few");
      if (staticTrack && !stage.classList.contains("has-card")) {
        let activeIndex = 0;
        const updateStaticSpotlight = () => {
          const nodes = Array.from(staticTrack.querySelectorAll(".sample-person"));
          if (!nodes.length || staticTrack.matches(":hover")) return;
          nodes.forEach((node, index) => {
            node.classList.toggle("is-spotlight", index === activeIndex % nodes.length);
          });
          activeIndex += 1;
        };
        updateStaticSpotlight();
        spotlightTimer = setInterval(updateStaticSpotlight, 1700);
        return;
      }
      const update = () => {
        const rect = stage.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const radius = rect.width * 0.14;
        document.querySelectorAll(".sample-person").forEach((node) => {
          const personRect = node.getBoundingClientRect();
          const personCenter = personRect.left + personRect.width / 2;
          node.classList.toggle("is-spotlight", Math.abs(personCenter - center) < radius);
        });
      };
      update();
      spotlightTimer = setInterval(update, 180);
    }

    function updateTopbar() {
      const authSlot = document.getElementById("authSlot");
      if (!authSlot) return;
      if (!state.sessionChecked) {
        authSlot.innerHTML = `
          <button class="avatar-button" type="button" aria-label="正在检查知乎登录状态" disabled>
            <span class="avatar-skeleton" aria-hidden="true"></span>
          </button>
        `;
        return;
      }
      const user = state.user || mockZhihuUser;
      authSlot.innerHTML = `
        <span class="auth-avatar-wrap">
          <button class="avatar-button" type="button" data-action="profile" aria-label="${escapeHtml(user.name)}的知乎主页">
            <img src="${escapeHtml(user.avatar)}" alt="">
          </button>
          <span class="auth-avatar-popover" role="tooltip">
            <strong>${escapeHtml(user.name)}</strong>
            <span>知乎个人主页</span>
          </span>
        </span>
      `;
    }

    function renderCrowd() {
      const makeRow = (count, scale, offset = 0) => Array.from({ length: count }, (_, index) => {
        const peepId = crowdPeepIds[(index + offset) % crowdPeepIds.length];
        const w = Math.round((74 + (index % 5) * 12) * scale);
        const h = Math.round((170 + (index % 4) * 22) * scale);
        return `
          <div class="walker" style="--w:${w}px;--h:${h}px;--delay:${(index % 8) * -0.25}s">
            <img src="${peepSrc(peepId)}" alt="">
          </div>
        `;
      }).join("");
      return `
        <div class="crowd-stage" aria-hidden="true">
          <div class="crowd-row" style="--bottom:-18px;--gap:18px;--opacity:1;--blur:0px;--speed:16s">${makeRow(22, 1.16, 0)}${makeRow(22, 1.16, 1)}</div>
          <div class="crowd-row reverse" style="--bottom:28px;--gap:28px;--opacity:.58;--blur:2px;--speed:22s">${makeRow(18, .88, 2)}${makeRow(18, .88, 3)}</div>
          <div class="crowd-row" style="--bottom:88px;--gap:34px;--opacity:.36;--blur:5px;--speed:28s">${makeRow(16, .68, 1)}${makeRow(16, .68, 0)}</div>
        </div>
      `;
    }

    function renderClarificationCard() {
      return `

          <p class="clarification-kicker">为了找到更接近的真实经历，想再确认一句：</p>

                ${escapeHtml(option)}

            跳过，先帮我找找看

    function renderHome() {

          <div class="center-stack">

    function renderLoading() {

        <section class="screen loading">
          <div class="loading-panel">
            <div class="loading-title">
              <h1>正在寻找可能与你有相似经历的知友……</h1>
              <span class="pulse-dot" aria-hidden="true"></span>
            </div>
            <div class="fingerprint-steps">
              ${steps.map((step, index) => `
                <div class="fingerprint-step ${index < state.loadingStep ? "is-done" : index === state.loadingStep ? "is-active" : ""}">
                  <strong>${escapeHtml(step.label)}：</strong>${escapeHtml(step.value)}
                </div>
              `).join("")}

    async function requestSearchData(query) {
      state.backendStatus = "loading";
      if (shouldUseMockSearch()) {
        state.backendStatus = "mock";
        return normalizeSearchResponse(mockSearchPayload(query), query);
      }
      try {
        let payload;
        if (window.LIFE_PATH_USE_DEMO_SEARCH) {
          payload = await postJson(API_CONFIG.demoSearchEndpoint, { query });
        } else {
          const params = new URLSearchParams();
          params.set("query", query);
          params.set("count", String(API_CONFIG.searchResultCount));
          if (state.clarificationAnswer) {
            params.set("clarification", state.clarificationAnswer);
          }
          payload = await getJson(`${API_CONFIG.searchEndpoint}?${params.toString()}`);
        }
        state.backendStatus = "ready";
        return normalizeSearchResponse(payload, query);
      } catch (error) {
        console.warn("Search API unavailable.", error);
        state.backendStatus = "error";
        throw error;
      }
    }

    async function handleStartQuery() {
      const input = document.getElementById("questionInput");
      const activePrompt = input?.dataset.prompt || queryPrompts[state.promptIndex % queryPrompts.length];

      state.question = input ? input.value.trim() || activePrompt : activePrompt;
      state.homeInputTouched = false;

      state.needClarification = false;
      state.clarificationQuestion = "";
      state.clarificationOptions = [];
      state.clarificationAnswer = "";
      state.loadingSteps = [];
      state.clarificationShown = false;
      state.isCheckingClarification = true;
      render();

      try {
        const result = await requestClarification(state.question);
        const body = getResponseBody(result) || result || {};

        state.isCheckingClarification = false;
        state.loadingSteps = normalizeLoadingSteps(body.loadingSteps || body.loading_steps);

        if (body && body.needClarification) {
          state.needClarification = true;
          state.clarificationQuestion = body.clarificationQuestion || "";
          state.clarificationOptions = Array.isArray(body.clarificationOptions)
            ? body.clarificationOptions
            : [];
          state.clarificationShown = true;
          render();
          return;
        }

        startLoading();
      } catch (error) {
        console.warn("Clarification API unavailable, continue search directly.", error);
        state.isCheckingClarification = false;
        startLoading();
      }
    }

    async function submitClarification(answer) {
      state.clarificationAnswer = answer || "";
      state.loadingSteps = [];
      state.clarificationShown = false;
      try {
        const result = await requestClarification(state.question, state.clarificationAnswer);
        const body = getResponseBody(result) || result || {};
        state.loadingSteps = normalizeLoadingSteps(body.loadingSteps || body.loading_steps);
      } catch (error) {
        console.warn("Clarification loadingSteps unavailable, continue search directly.", error);
      }
      startLoading();
    }

    function skipClarification() {
      state.clarificationAnswer = "";
      state.loadingSteps = [];
      state.clarificationShown = false;
      startLoading();
    }

    async function startLoading() {
      const requestId = state.searchRequestId + 1;
      state.searchRequestId = requestId;
      resetSearchResults();
      state.loadingStep = 0;
      state.hasSubmittedQuestion = true;
      state.submittedQuestion = state.question;
      state.analysisSteps = defaultAnalysisSteps(state.question);
      state.focusTags = ["身份周期", "现金流", "工作边界", "回流代价"];
      setPage("loading");
      clearLoadingTimers();
      const searchPromise = requestSearchData(state.question).then((searchData) => {
        if (searchData.loadingSteps.length) {
          state.loadingSteps = searchData.loadingSteps;
          if (state.page === "loading") render();
        }
        return searchData;
      });
      const minimumLoading = new Promise((resolve) => setTimeout(resolve, 4300));
      [1, 2, 3, 4].forEach((step, index) => {
        loadingTimers.push(setTimeout(() => {
          state.loadingStep = step;
          if (state.page === "loading") updateLoadingSteps();
        }, 850 * (index + 1)));
      });
      try {
        const [searchData] = await Promise.all([searchPromise, minimumLoading]);
        if (requestId !== state.searchRequestId) return;
        clearLoadingTimers();
        applySearchData(searchData, state.question);
        setPage("paths");
      } catch (error) {
        if (requestId !== state.searchRequestId) return;
        console.warn("Search request failed.", error);
        clearLoadingTimers();
        resetSearchResults();
        state.backendStatus = "error";
        state.searchError = getSearchFailureMessage(error);
        setPage("paths");
      }
    }

    function updateLoadingSteps() {
      document.querySelectorAll(".fingerprint-step").forEach((node, index) => {
        node.classList.toggle("is-done", index < state.loadingStep);
        node.classList.toggle("is-active", index === state.loadingStep);
      });
    }

    function renderPaths() {
      const sortedPaths = sortPathsByCount(paths);
      const resultMode = getResultModeFor(sortedPaths, people);
      if (state.backendStatus === "error") return renderSearchErrorResults();
      if (resultMode === "empty") return renderLowRecallResults();
      if (isDirectPeopleResult(resultMode)) return renderDirectPeopleResult(resultMode, sortedPaths[0] || null);

      const selectedPath = getPath();
      const pathCountClass = `paths-count-${Math.min(Math.max(sortedPaths.length, 1), 5)}`;
      return `
        <section class="screen paths-screen ${state.pathExpanded ? "has-expanded" : "is-overview"}">
          <div class="paths-copy">
            <h1>关于「${escapeHtml(state.question)}」，TA 们是这样做的...</h1>
          </div>
          <div class="path-showcase ${pathCountClass} ${sortedPaths.length <= 3 ? "compact-paths" : ""}" aria-label="前人路径">
            ${renderPathCards(sortedPaths)}
          </div>
          ${state.pathExpanded ? `
            <section class="expanded-path-section" id="expandedPathSection" aria-label="${escapeHtml(selectedPath.name)}的人">
              <div class="expanded-heading">

                  <h1>${escapeHtml(selectedPath.name)}的人</h1>

                ${renderExpandedPathPanel(selectedPath)}
              </div>

    function directPeopleResultCopy(resultMode, onlyPath) {

      return `

    function renderSearchErrorResults() {

      return `
        <section class="screen paths-screen low-recall-screen">
          <div class="paths-copy low-recall-copy">

            <button class="primary" type="button" data-action="retry-search">重新搜索</button>
          </div>
        </section>
      `;
    }

    function renderPathCards(sortedPaths) {
      return sortedPaths.map((path, index) => {
        const visiblePeople = visiblePeopleForPath(path.id);
        return `
        <button class="path-card ${state.pathExpanded && path.id === state.selectedPathId ? "is-current" : ""}" data-action="choose-path" data-id="${path.id}" type="button">

    function renderCommunityExit() {

    function getRailPeopleForSelectedPath() {
      const selectedPath = getPath();
      const visible = peopleForPath(selectedPath.id);
      const selectedPerson = state.selectedPersonId ? getPerson() : null;
      return selectedPerson ? visible.filter((person) => person.id !== selectedPerson.id) : visible;
    }

    function getWallPeopleForSelectedPath() {
      if (!paths.length) {
        const selectedPerson = state.selectedPersonId ? getPerson() : null;
        return selectedPerson?.id ? [selectedPerson] : people.slice(0, 6);
      }
      const matched = peopleForPath(getPath().id);
      return (matched.length ? matched : people).slice(0, 6);
    }

    function getPersonEntrySituation(person) {
      return textOf(person.entrySituation || person.entry_situation || person.situation || person.who || "");
    }

    function getPersonEntryStatus(person) {

    }

    function renderSampleEntryCard(person, index = 0) {

    function renderSampleStage() {
  const selectedPerson = state.selectedPersonId ? getPerson() : null;
  const wallPeople = getWallPeopleForSelectedPath();
  const detailOpen = state.readerOpen || state.askPanelOpen;
  const countClass = `count-${Math.max(1, Math.min(wallPeople.length, 6))}`;
  const shouldShowPickHint = wallPeople.length > 1;

  return `
    <div class="sample-wall-panel ${selectedPerson ? "has-selection" : ""} ${detailOpen ? "is-detail-open" : ""} ${state.readerOpen ? "is-reading" : ""} ${state.askPanelOpen ? "is-asking" : ""}">
      <div class="sample-wall">
        ${shouldShowPickHint ? `<p class="sample-wall-kicker">先选一个人，看看 TA 的经历</p>` : ""}
        ${wallPeople.length ? `
          <div class="sample-wall-grid ${countClass}">
            ${wallPeople.map((person, index) => renderSampleEntryCard(person, index)).join("")}
          </div>
        ` : `<p class="sample-wall-empty">这条路径下暂时没有可展示的人物样本。</p>`}
      </div>
      ${selectedPerson ? `<div class="person-card-shell" id="personCardShell">${renderPersonCard(selectedPerson)}</div>` : ""}
      <div class="inline-reader-shell" id="inlineReaderShell">${selectedPerson && state.readerOpen ? renderInlineReader(selectedPerson) : ""}</div>
      <div class="inline-ask-shell" id="inlineAskShell">${selectedPerson && state.askPanelOpen ? renderInlineAskPanel(selectedPerson) : ""}</div>
    </div>
  `;
}

    function getPersonSourceTitle(person) {
      const article = getPersonArticles(person)[0];
      return textOf(person.sourceTitle || person.source?.title || article?.title || `${person.name} 的知乎原文`);
    }

    function getPersonSourceUrl(person) {
      const article = getPersonArticles(person)[0];
      return textOf(person.sourceUrl || person.source?.url || article?.sourceUrl || "");
    }

    function getPersonSourceExcerpt(person) {
      const article = getPersonArticles(person)[0];
      return textOf(person.sourceExcerpt || person.source?.excerpt || article?.summary || article?.body?.[0] || person.keyExperience || "");
    }

    function getPersonKeyFragments(person) {
      return toArray(person.key_fragments || person.keyFragments || person.raw?.key_fragments || person.raw?.keyFragments || person.realDetails)
        .map((item) => textOf(item))
        .filter(Boolean)
        .slice(0, 6);
    }

    function getPersonaChatPublicText(person) {
      const parts = [
        person.name,
        person.situation,
        person.actionSummary,
        person.currentStatus,
        person.entrySituation,
        person.entryStatus,
        getPersonSourceTitle(person),
        getPersonSourceExcerpt(person),
        ...toArray(person.realDetails),
        ...getPersonKeyFragments(person)
      ];
      return parts.map((item) => textOf(item).trim()).filter(Boolean).join("\n");
    }

    function hasPersonaChatPublicContent(person) {
      const sourceUrl = getPersonSourceUrl(person);
      const compactPublicText = getPersonaChatPublicText(person).replace(/\s+/g, "");
      return Boolean(sourceUrl && compactPublicText.length >= 30);
    }

    function buildPersonaChatPersonSnapshot(person) {
      return {
        name: textOf(person.name),
        situation: textOf(person.situation || person.who),
        actionSummary: textOf(person.actionSummary || person.oneLine),
        realDetails: toArray(person.realDetails).map((item) => textOf(item)).filter(Boolean).slice(0, 5),
        key_fragments: getPersonKeyFragments(person),
        currentStatus: textOf(person.currentStatus),
        entrySituation: textOf(person.entrySituation || person.entry_situation),
        entryStatus: textOf(person.entryStatus || person.entry_status),
        sourceTitle: getPersonSourceTitle(person),
        sourceUrl: getPersonSourceUrl(person),
        sourceExcerpt: getPersonSourceExcerpt(person),
        source: {
          title: getPersonSourceTitle(person),
          url: getPersonSourceUrl(person),
          excerpt: getPersonSourceExcerpt(person)
        }
      };
    }

    function buildPersonaChatRequest(person, question) {
      return {
        queryId: state.queryId || "",
        query: state.submittedQuestion || state.question || "",
        personId: person.id,
        question,
        person: buildPersonaChatPersonSnapshot(person)
      };
    }

    function extractPersonaChatAnswer(body = {}) {
      const answer = textOf(body.answer || body.reply || body.content || body.message || body.messages?.at?.(-1)?.content);
      if (answer) return answer;
      if (body.insufficientContext || body.insufficient_context) return PERSONA_CHAT_MISSING_INFO_MESSAGE;
      return "";
    }

    function renderPersonCard(person) {
      const sourceTitle = getPersonSourceTitle(person);
      const sourceUrl = getPersonSourceUrl(person);
      const situation = textOf(person.situation || person.who || "这位知友分享了与当前问题相近的处境。");
      const actionSummary = textOf(person.actionSummary || person.oneLine || "原文记录了 TA 在这个处境里的选择和行动。");
      const realDetails = toArray(person.realDetails).map((item) => textOf(item)).filter(Boolean).slice(0, 5);
      const currentStatus = textOf(person.currentStatus || "");
      const hasSourceExperience = Boolean(sourceTitle || sourceUrl);
      const canAskPublicContent = hasPersonaChatPublicContent(person);
      const saved = isPersonSaved(person);
      return `
        <article class="person-card has-peep">
          <div class="person-card-body">
            <div class="card-peep" aria-hidden="true">${avatarImg(person.avatar, 0, "", person.name)}</div>
            <h2>${escapeHtml(person.name)}</h2>
            <div class="section-block">
              <h3>TA 的处境</h3>
              <p>${escapeHtml(situation)}</p>
            </div>
            <div class="section-block">
              <h3>TA 做了什么</h3>
              <p>${escapeHtml(actionSummary)}</p>
            </div>
            ${realDetails.length ? `
            <div class="section-block">
              <h3>TA 提到的细节</h3>
              <ul class="detail-list">${realDetails.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </div>
            ` : ""}
            ${currentStatus ? `
            <div class="section-block">
              <h3>现在走到哪一步</h3>
              <p>${escapeHtml(currentStatus)}</p>
            </div>
            ` : ""}
            ${hasSourceExperience ? `
            <div class="section-block person-section source-section">
              <h3>TA 的真实经历</h3>
              <div class="source-row">
                ${sourceTitle ? `<span class="source-title">《${escapeHtml(sourceTitle)}》</span>` : ""}
                ${sourceUrl ? `<a class="source-original-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">查看知乎原文 ↗</a>` : ""}
              </div>
            </div>
            ` : ""}
          </div>
          <div class="card-actions">
            <button class="primary" type="button" data-action="ask-person" ${canAskPublicContent ? "" : `disabled title="${escapeHtml(PERSONA_CHAT_INSUFFICIENT_MESSAGE)}"`}>向TA提问</button>
            <button class="text-button" type="button" data-action="save-person" ${saved ? `disabled aria-disabled="true"` : ""}>${saved ? "已存入样本库" : "存入我的样本库"}</button>
          </div>
        </article>
      `;
    }

    function getPersonArticles(person) {
      return toArray(person.articles).map((article, index) => normalizeArticle(article, index, person));
    }

    function renderInlineReader(person) {
      const articles = getPersonArticles(person);
      const articleIndex = Math.min(state.readerArticleIndex, Math.max(articles.length - 1, 0));
      const article = articles[articleIndex] || normalizeArticle({ title: `${person.name} 的公开分享`, body: person.articleBody }, 0, person);
      const body = article.body.length ? article.body : (article.summary ? [article.summary] : toArray(person.articleBody));
      const sourceUrl = article.sourceUrl || getPersonSourceUrl(person);
      const canAskPublicContent = hasPersonaChatPublicContent(person);
      return `
        <article class="inline-reader">
          <div class="inline-reader-scroll">
            <h2>${escapeHtml(article.title)}</h2>
            ${sourceUrl ? `<p class="reader-meta"><a class="reader-source-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noreferrer">查看知乎原文</a></p>` : ""}

          </div>
          <div class="reader-actions">
            <button class="primary" type="button" data-action="question-from-reader" ${canAskPublicContent ? "" : `disabled title="${escapeHtml(PERSONA_CHAT_INSUFFICIENT_MESSAGE)}"`}>向TA提问</button>
            <button class="skip-ask-button reader-close" type="button" data-action="close-reader">收起原文</button>
          </div>

    function renderInlineAskPanel(person) {
      const canAskPublicContent = hasPersonaChatPublicContent(person);
      return `
        <article class="inline-ask-panel">
          <div class="ask-panel-head">
            <span class="panel-kicker">向TA提问</span>
          </div>
          <textarea class="inline-question-text" id="inlineQuestionText">${escapeHtml(state.questionText)}</textarea>
          <div class="ask-panel-actions">
            <button class="primary" type="button" data-action="chat-from-inline-ask" ${canAskPublicContent ? "" : `disabled title="${escapeHtml(PERSONA_CHAT_INSUFFICIENT_MESSAGE)}"`}>问问TA的AI分身</button>
            <button class="text-button is-disabled-like" type="button" data-action="mock-dm-from-inline-ask" aria-disabled="true">递给 TA 本人（暂不可用）</button>
            <button class="skip-ask-button" type="button" data-action="close-inline-ask">先不问，我再看看</button>
          </div>
        </article>
      `;

    function renderChat() {
      const person = getPerson();
      const canAskPublicContent = hasPersonaChatPublicContent(person);
      const saved = isPersonSaved(person);
      return `
        <section class="screen">
          <div class="chat-layout">
            <aside class="chat-side">
              <div class="mini-person">
                <div class="mini-peep-card chat-peep-card">${avatarImg(person.avatar, 0, "", person.name)}</div>

                  <strong>${person.name}</strong>
                  <p style="color:var(--muted);line-height:1.6">${person.role}<br>${getPath(person.pathId).name}</p>

              <div class="disclaimer">这是基于${person.name}公开内容生成的经验问答，用来帮你理解 TA 曾经分享过的经历。它不代表本人实时观点，也不代表本人授权回复。</div>
              <div class="action-row" style="justify-content:flex-start">
                <button class="secondary" type="button" data-action="samples">返回人物卡</button>
                <button class="secondary" type="button" data-action="save-person" ${saved ? `disabled aria-disabled="true"` : ""}>${saved ? "已存入样本库" : "存入样本库"}</button>
              </div>

                ${state.aiTyping ? `<div class="message ai typing" aria-label="正在基于公开内容生成回答"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>` : ""}
              </div>

                <div class="chat-input">

                  <button class="primary" type="button" data-action="send-chat" ${state.aiTyping || !canAskPublicContent ? "disabled" : ""}>发送</button>
                </div>
              </div>
            </section>
          </div>
        </section>
